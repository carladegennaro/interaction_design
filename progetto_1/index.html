<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyes on Earth</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        #scroll-container { height: 400vh; }
        .section { height: 100vh; display: flex; align-items: center; padding: 0 60px; pointer-events: none; }
        
        #header { max-width: 800px; pointer-events: auto; transition: opacity 0.6s ease, transform 0.6s ease; }
        #header.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }
        
        h1 { font-weight: 900; font-size: 84px; margin: 0; letter-spacing: -2px; line-height: 0.9; text-transform: uppercase; }
        .subtitle { font-size: 18px; margin-top: 20px; max-width: 450px; opacity: 0.7; line-height: 1.5; }
        
        .info-panel { position: fixed; top: 50%; right: 60px; transform: translateY(-50%); width: 320px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 30px; border-left: 3px solid #fff; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 10; }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        .info-panel h2 { font-size: 32px; margin: 0 0 15px 0; font-weight: bold; }
        .info-panel p { font-size: 16px; opacity: 0.9; line-height: 1.6; margin-bottom: 20px; }
        
        .read-more-btn, .back-btn, .nav-btn { display: inline-block; padding: 10px 20px; border: 1px solid white; color: white; text-decoration: none; font-size: 12px; letter-spacing: 1px; transition: all 0.3s; cursor: pointer; background: transparent; text-transform: uppercase; }
        .read-more-btn:hover, .back-btn:hover, .nav-btn:hover { background: white; color: black; }

        #lang-btn { position: fixed; top: 40px; right: 60px; z-index: 50; }
        #about-btn { position: fixed; top: 40px; left: 60px; z-index: 50; }

        #about-panel { position: fixed; top: 90px; left: 60px; width: 300px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 20px; border-left: 2px solid #fff; display: none; z-index: 60; }
        #about-panel.active { display: block; }

        #detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; padding: 100px 60px; box-sizing: border-box; overflow-y: auto; }
        #detail-page.active { display: block; }
        .detail-layout { display: flex; flex-direction: column; align-items: flex-start; gap: 40px; }
        #earth-3d-container { width: 100%; height: 400px; display: flex; justify-content: center; align-items: center; }
        
        /* Detail Page Layout Improvements */
        .detail-layout { flex-direction: row; align-items: flex-start; }
        .detail-text { flex: 1; max-width: 50%; }
        #earth-3d-container { flex: 1; height: 400px; }

        .back-btn { position: fixed; top: 40px; right: 60px; z-index: 105; }
    </style>
</head>
<body>

<button id="about-btn" class="nav-btn" onclick="toggleAbout()">About</button>
<button id="lang-btn" class="nav-btn" onclick="toggleLang()">EN / IT</button>

<div id="about-panel">
    <h3>Eyes on Earth</h3>
    <p>Monitoraggio satellitare globale per lo studio dei cambiamenti climatici.</p>
</div>

<div id="scroll-container">
    <div class="section"><div id="header"><h1 id="main-title">Eyes on<br>Earth</h1><p class="subtitle" id="main-subtitle">Are satellites essential for monitoring climate change?</p></div></div>
    <div id="info-panel" class="info-panel"><h2 id="sat-name"></h2><p id="sat-desc"></p><button class="read-more-btn" onclick="openDetails()">READ MORE</button></div>
</div>

<div id="detail-page">
    <button class="back-btn" onclick="closeDetails()">BACK</button>
    <h1 id="detail-title" style="margin-bottom: 50px;">SATELLITE NAME</h1>
    <div class="detail-layout">
        <div class="detail-text"><p><strong>Analisi Tecnica:</strong> Ruota il modello per osservare i dettagli della missione.</p></div>
        <div id="earth-3d-container"></div>
    </div>
</div>

<script>
    let angle = 0;
    let satellites = [];
    let stars = [];
    let camPos, targetCamPos;
    let selectedSatIndex = -1;
    let earthTexture, detailSketch, earthImg;
    let oco2Model, sentinelModel, icesatModel;
    
    let currentLang = 'en';
    const translations = {
        en: { subtitle: "Are satellites essential for monitoring climate change?", readMore: "READ MORE", back: "BACK", sat0: "OCO-2: Maps global CO2 levels.", sat1: "SENTINEL-6: Sea level monitoring.", sat2: "ICESAT-2: Measures polar ice thickness." },
        it: { subtitle: "I satelliti sono essenziali per il clima?", readMore: "LEGGI TUTTO", back: "INDIETRO", sat0: "OCO-2: Mappa i livelli di CO2.", sat1: "SENTINEL-6: Monitoraggio livello mare.", sat2: "ICESAT-2: Misura il ghiaccio polare." }
    };

    function preload() {
        earthImg = loadImage('earth albedo.jpg');
        oco2Model = loadModel('Orbiting Carbon Observatory (OCO) 2.obj', true);
        sentinelModel = loadModel('Jason Continuity of Service (Sentinel-6).obj', true);
        icesatModel = loadModel('Ice, Clouds, and Land Elevation Satellite-2 (ICESat-2) (A).obj', true);
    }

    function createHighDetailTexture(p) {
        let tex = p.createGraphics(2048, 1024);
        if (earthImg) tex.image(earthImg, 0, 0, 2048, 1024);
        else tex.background(5, 15, 40);
        return tex;
    }

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
        earthTexture = createHighDetailTexture(this);
        camPos = createVector(0, 0, 950);
        targetCamPos = createVector(0, 0, 950);
        for (let i = 0; i < 500; i++) stars.push({x: random(-2000, 2000), y: random(-2000, 2000), z: random(-2000, 2000)});

        satellites = [
            { name: "OCO-2", x: 220, y: -50, z: 50, color: [255, 50, 0], desc: translations[currentLang].sat0, model: oco2Model, filter: [255, 150, 100] },
            { name: "SENTINEL-6", x: -240, y: 30, z: -80, color: [0, 255, 100], desc: translations[currentLang].sat1, model: sentinelModel, filter: [100, 255, 150] },
            { name: "ICESAT-2", x: 60, y: -230, z: 30, color: [0, 150, 255], desc: translations[currentLang].sat2, model: icesatModel, filter: [150, 200, 255] }
        ];
    }

    function draw() {
        if (window.scrollY >= document.body.scrollHeight - windowHeight - 5) window.scrollTo(0, 0);
        background(0);
        
        // Stelle
        push(); stroke(255); strokeWeight(2);
        for (let s of stars) point(s.x, s.y, s.z);
        pop();

        let scrollFraction = window.scrollY / (document.body.scrollHeight - windowHeight);
        if (scrollFraction < 0.1) {
            selectedSatIndex = -1;
            targetCamPos.set(0, 0, 950);
            document.getElementById('info-panel').classList.remove('visible');
            document.getElementById('header').classList.remove('hidden');
        } else {
            document.getElementById('info-panel').classList.add('visible');
            document.getElementById('header').classList.add('hidden');
            if (scrollFraction < 0.4) selectedSatIndex = 0;
            else if (scrollFraction < 0.7) selectedSatIndex = 1;
            else selectedSatIndex = 2;

            let s = satellites[selectedSatIndex];
            document.getElementById('sat-name').innerText = s.name;
            document.getElementById('sat-desc').innerText = s.desc;
            
            // ZOOM SUL SATELLITE (Punto di osservazione ravvicinato)
            targetCamPos.set(s.x * 1.5, s.y * 1.5, s.z * 1.5 + 50);
        }

        camPos.lerp(targetCamPos, 0.05);
        camera(camPos.x, camPos.y, camPos.z, 0, 0, 0, 0, 1, 0);
        ambientLight(150); pointLight(255, 255, 255, 500, -500, 500);

        // TERRA CON FILTRO SATELLITE
        push(); rotateY(angle); 
        if (selectedSatIndex !== -1) tint(satellites[selectedSatIndex].filter);
        texture(earthTexture); noStroke(); sphere(200); pop();

        // SATELLITI IN PROPORZIONE (Molto piccoli)
        for (let i = 0; i < satellites.length; i++) {
            let s = satellites[i];
            push(); translate(s.x, s.y, s.z); rotateY(angle * 2);
            fill(s.color); noStroke(); rotateX(PI);
            // Scala ridotta per realismo proporzionale
            scale(0.1); // Unified scale for all satellites, made bigger
            model(s.model);
            pop();
        }
        angle += 0.002;
    }

    function openDetails() {
        document.getElementById('detail-title').innerText = satellites[selectedSatIndex].name;
        document.getElementById('detail-page').classList.add('active');
        if (detailSketch) detailSketch.remove();
        detailSketch = new p5(detailSatelliteSketch, 'earth-3d-container');
    }

    function closeDetails() { document.getElementById('detail-page').classList.remove('active'); }

    const detailSatelliteSketch = (p) => {
        p.setup = () => { p.createCanvas(400, 300, p.WEBGL); };
        p.draw = () => {
            p.background(0);
            p.orbitControl(); 
            p.ambientLight(200); p.pointLight(255, 255, 255, 200, -200, 200);
            p.push();
            p.rotateX(p.PI);
            p.fill(satellites[selectedSatIndex].color);
            p.noStroke();
            // Scala per ispezione interattiva
            let d_scale = (selectedSatIndex === 2) ? 100 : 3;
            if (selectedSatIndex === 1) d_scale = 2.5;
            p.scale(d_scale);
            p.model(satellites[selectedSatIndex].model);
            p.pop();
        };
    };

    function toggleLang() { currentLang = currentLang === 'en' ? 'it' : 'en'; }
    function toggleAbout() { document.getElementById('about-panel').classList.toggle('active'); }
</script>
</body>
</html>
